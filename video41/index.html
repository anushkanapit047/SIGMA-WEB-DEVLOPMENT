<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar usng flexbox</title>
    <style>
        body{
            background-color: rgb(230, 230, 230);
        }

        *{
            padding: px;
            margin: px;
          
        }


        nav{
            background-color: rgb(217, 225, 228);
            color: rgb(0, 0, 0);
           
        ul{ 
            display: flex;
            justify-content: end;
            gap: 34px;
            padding: 0 6px;
            margin: 0px 0px;
            
            

        }
        
           
            
        }
        ul li{
            list-style: none;
            
            
            font-size: large;
            font-weight: 900;
            font-style: italic;
            
            
        
        
            
        }

        ul li a{
            text-decoration: none;
            color: rgb(0, 0, 0);
            
            
            
        }

        .logo{
            background-color: rgb(0, 0, 0);
            height: 40px;
            width: 40px;
    
            
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo"></div>
            
            <ul>
                <li><a href="/">Products</a></li>
                <li><a href="/">Pricing</a></li>
                <li><a href="/">Resources</a></li>
                <li><a href="/">About us</a></li>
                
            </ul>
    </header>        
        </nav>
    </div>
    
</body>
</html>
