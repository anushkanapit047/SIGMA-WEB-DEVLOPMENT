<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>CSS Lists</title>
        <style>
            nav ul li{
                list-style: devanagari;
                list-style-type: disc;
                background-color: rgb(65, 155, 224);
                list-style-position: inside;
                text-shadow: 2px 3px 4px rgb(43, 6, 43);
                box-shadow: 6px 6px 5px rgb(105, 11, 139);
                border: 2px solid rgb(29, 10, 90);
               /* list-style-image: url(Screenshot\ 2024-12-05\ 032142.png);*/
               
                

            }
        </style>
    </head>
    <body>
        <nav>
            <ul>
                <li>HOME</li>
                <li>ABOUT</li>
                <li>CONTECT</li>
            </ul>

        </nav>
    </body>
</html>
