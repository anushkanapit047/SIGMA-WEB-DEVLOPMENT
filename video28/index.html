<DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title> CSS Position</title>
        <style>
            * {
                margin: 0;
                padding: 0;
            }

            .box1 {
                background-color: rgb(99, 193, 146);
                position: sticky;
                top: 0px;
                height: 111px;
                width: 100%;
                margin: 0;
                padding: 0;
                /* position: absolute; */
                /* top: 0px; */

                .box2 {
                    background-color: rgb(232, 223, 217);
                    /*top: 34px;
        left: 34px; */
                    position: relative;

                    z-index: 6;
                }

                .box3 {
                    background-color: rgb(214, 222, 217);
                    /* position: fixed;
                bottom: 0px;
                left: 8vw;
                height: 111px; */
                }


            }

            .box4 {
                background-color: rgb(130, 130, 228);
            }

            .box {
                height: 433px;
                width: 80vw;
                padding: 2px;
                margin: 2px;
                border: 2px solid black;
            }

            .parent {
                /* Exception: transform, filter, or perspective properties can also make an element appear as positioned */
                padding: 43px;
                margin: 34px;
                border: 3px solid purple;
                /* position: absolute;*/
                /* transform: translate(0); */
                /* filter: invert(0);*/
                perspective: 0em;
            }
        </style>
    </head>

    <body>
        <div class="parent">
            <div class="box box1"></div>
            <div class="box box2"></div>
            <div class="box box3"></div>
            <div class="box box4"></div>
        </div>

    </body>

    </html>
