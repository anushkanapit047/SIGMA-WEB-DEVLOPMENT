<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>solution of video33(CSS Multicolor websites)</title>
    <style>

        :root{
            --primary-color:  rgb(55, 19, 176); 
            --text-color:  rgb(255, 255, 255);
            --secondary-color: rgb(129, 132, 209);
        }

        body{
            background-color: var(--secondary-color);
        }
         

        *{
          margin: 0;  
          padding: 0;
        }

        nav{
           background-color: var(--primary-color);
            padding: 12px 0;
            
        }

        ul li{
            list-style: none;
            display: inline;
            padding: 23px;
            font-weight: bolder;
           color: var(--text-color);
        }

        ul li a{
              color: var(--text-color);
            text-decoration: none;
        }

    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/">About</a></li>
                <li><a href="/">Services</a></li>
                <li><a href="/">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    
</body>
</html>
