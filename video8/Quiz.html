<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMS</title>
    <link rel="stylesheet" href="Quiz.css">
</head>
<body>
    <h1>Form to apply for sigma web Development course</h1>
    <form action="post">
        <lable for="username">ENTER YOUR USERNAME :-</lable>
        <input type="text" id="username" name="username" placeholder="Enter your username">

        <div>
            <lable for="usercity"> ENTER YOUR CITY :-</lable>
            <input type="text" id="usercity" name="city" placeholder="Enter your city"
        </div>

        <div>
            <lable for="userpincode"> ENTER YOUR PINCODE :-</lable>
            <input type="number" id="userpincode" name="pincode" minlength="6" maxlength="6" placeholder="enter pin code"
        </div>
    </form>
    
</body>
</html>
