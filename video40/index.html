<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout exercise 5 solution

    </title>
    <style>
        header {
            position: sticky;
            top: 0;
        }

        * {
            margin: 0;
            padding: 0;
        }

        nav {
            background-color: bisque;
            height: 83px;
            position: sticky;
            top: 0;
        }

        main {
            background-color: black;
            color: rgb(255, 255, 255);
            text-align: center;
            padding: 10px;


        }

        .container {
            background-color: blueviolet;
            height: 300px;
            margin: 12px 34px;
            text-align: center;
            padding: 30px 30px;



        }

        .box1 {
            background-color: brown;
            height: 250px;
            width: 250px;
            display: inline-block;
            margin: 0 20px;


        }

        .box2 {
            background-color: darkgoldenrod;
            height: 250px;
            width: 250px;
            display: inline-block;
            margin: 0 20px;
        }

        .text-box {
            padding: 34px;
            border: 2px solid white;
            margin: 100px 100px;
            border-radius: 50px;
            font-size: 2em;
        }



        footer {
            height: 100px;
            background-color: bisque;

        }

        .orangebox {
            height: 40px;
            width: 40px;
            background-color: orange;
            border-radius: 100px;
            position: fixed;
            bottom: 10px;
            right: 2px;
        }
    </style>
</head>

<body>
    <header>

    </header>
    <nav>

    </nav>

    <main>
        <div class="container">
            <div class="box1"></div>
            <div class="box2"></div>

        </div>

        <div class="text-box">
            <p>welcome to sigma web development express</p>
        </div>

        <div class="orangebox">

        </div>

    </main>

    <footer>

    </footer>

</body>

</html>
