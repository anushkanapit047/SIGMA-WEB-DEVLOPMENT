<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms - Lets learn it</title>
</head>
<body>
    <h1>Form to apply for sigma web development course - student</h1>
    <form action="post">
        <div>
              <label for="username">Enter your username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username">
        </div>
        <div><input type="radio" id="male" name="gender" value="male">
        <lable for="male">male</lable>
        <input type="radio" id="female" name="gender" value="female">
        <lable for="female">Female</lable></div>
        
        <div>
            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
            <lable for="subscribe">subscribe to newsletter</lable>
        </div>

        <div>
            <lable for="comment">Enter your coment</lable>
            <textarea id="comment" name="comment" rows="5" cols="50">
                
            </textarea>
        </div>

        <div>
            <select name="fruits">
                <option value="apple">Apple</option>
                <option value="banana">Banana</option>
                <option value="cherry">Cherry</option>
            </select>
        </div>        




    </form>
        
    
</body>
</html>
