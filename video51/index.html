<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounce Animation</title>
    <style>
            .box{
                
        
            background-color: red;
            width: 50px;
            height: 50px;
            border-radius: 55px;
            position: absolute;
            
            bottom: 50px;
           animation: anuy 6s linear infinite, anushkax 1s ease-in-out infinite alternate;
        }

        .box1{
            
            background-color: red;
            width: 50px;
            height: 50px;
            border-radius: 55px;
            position: absolute;
            bottom: 50px;
            animation: tanu 6s linear infinite, manu 1s ease-in-out infinite alternate;
        }

        
    
         @keyframes anushkax{
            from{
                left: 0;   
            }
            to{
               left: 100%; 
            }
         }

          @keyframes anuy{
            from{
                bottom: 0;
            }

            to{
              bottom: 100%;
            }
         }
             
         @keyframes tanu{
            from{
                left: 0;
            }
            to{
                left: 100%;
            }
         }

         @keyframes manu{
            from{
                bottom: 0;
            }
            to{
                bottom: 100%;
            }
         }
        

            
        

        .container{
            background-color: blue;
            height: 90vh;
            width: 100vw;
        }

    </style>
</head>
<body>
   <div class="container">
    <div class="box"></div>
    <div class="box1"></div>
   </div>
</body>
</html>
