<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS BoxModel</title>
    <style>
        .box{
            background-color: rgb(1, 15, 15);
        }
        .box1{
            color: yellow;
            padding: 10px;
            margin: 5px;
            border: 10px solid rgb(80, 237, 135);
            height: 100px;
            box-sizing: border-box;
        }
        .box2{
            color: rgb(213, 211, 237);
            padding: 10px;
            margin: 5px;
            border: 10px solid yellow;
            height: 100px;
            box-sizing: border-box;

        }
    </style>
</head>
<body>
    <div class="box box1"> I am a box </div>
    <div class="box box2"> I am another box </div>
    
</body>
</html>
