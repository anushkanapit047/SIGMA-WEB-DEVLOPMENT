<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounce Animation</title>
    <style>
            .box{
                
        
            background-color: red;
            width: 50px;
            height: 50px;
            border-radius: 55px;
            position: absolute;
            
            bottom: 50px;
            animation-name:  anushka;
            animation-duration: 1s;
            animation-timing-function: cubic-bezier(3, 2, 5, 1);
            animation-iteration-count: infinite;
            animation-delay: 2s;
             animation-direction: normal; 
        }

        
    
         @keyframes anushka{
            from{
                    background-color: aqua;
            }
            to{
                background-color: rgb(122, 22, 6);
                 transform:  translateY(-350px) translateX(100px)
            }
         }

         /* @keyframes anu{
            from{
                transform:
            }

            to{
                background-color: palevioletred;
                transform: translate(350px); 
            }
         }
             */
      
        

            
        

        .container{
            background-color: blue;
            height: 90vh;
            width: 100vw;
        }

    </style>
</head>
<body>
   <div class="container">
    <div class="box"></div>
   </div>
</body>
</html>
