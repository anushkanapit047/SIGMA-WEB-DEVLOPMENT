<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display Property</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }


        .box {
            border: 5px solid green;
            display: inline-block;
            padding: 45px;
            margin: 34px;

        }

        .box1 {
            /* display: none;*/
             visibility: hidden; 
        }
    </style>
</head>

<body>
    <div class="box">
        I am a anushka
    </div>
    <div class="box"> And</div>


    <span class="box ,box1"> I am a good</span>
    <span class="box"> girl</span>

</body>

</html>
