<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        /* Element Selector */
        div {
            /* background-color: darkorange; */
        }

        /* class Selector */
        .red {
            background-color: rgb(210, 30, 30);
        }

        /* Id Selector */
        #green {
            background-color: chartreuse;
        }

        article {
            background-color: rgb(2, 62, 42);
            color: blue;
        }

        /* Child Selectors*/
        div>p {
            color: blanchedalmond;
            background-color: black;
        }

        /* Descendant Selector */
        div p {
            color: blue;
            background-color: rgb(165, 42, 147);
        }

        /* Universal Selectors */

        * {
            margin: 0;
            padding: 0;
        }

        /* pseudo Selector */
        a:visited {
            color: gold;
        }

        a:link {
            color: aquamarine;
        }

        a:active {
            background-color: blueviolet;
        }

        a:hover {
            background-color: rgb(250, 60, 60);
        }

        p:first-child {
            background-color: aqua;
        }
    </style>
</head>

<body>
    <main class="one">
        <p> i am first</p>
        <p>i am second</p>
    </main>
    <div class="Selector">
        i am selector
    </div>
    <div class="red">
        I am a div
        <article>

            <p> I am a para inside div </p>
        </article>

    </div>

    <div id="green">
        I am another div
    </div>
    <a href="https://www.myntra.com"> Go to myntra</a>
    <a href="https://www.facebook2.com"> Go to facebook</a>

</body>

</html>
