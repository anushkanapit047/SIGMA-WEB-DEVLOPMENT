<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Shadows and Outlines</title>
    <style>
        .anu{
            border: 0px solid white;
            padding: 34px;
            box-shadow: 12px 13px 12px 5px rgb(74, 15, 106);
    background-color: rgb(92 95 210 / 40%);
        }

        .text-element {
text-shadow: 2px 4px 3px rgb(200, 16, 117);
outline: 2px solid green;
outline-offset: 6px;
border: 2px solid blue;
border-radius: 20px;
        }
     
    </style>
</head>
<body>
    <div class="anu">
        I am anushka napit and i am in b.tech 3rd year
    </div>
    <P class="text-element">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Sed nisi inventore illo maiores quis. Deleniti quas dolor cupiditate velit dolorum, doloribus eos minima error unde. Ducimus porro nisi adipisci necessitatibus soluta quam et blanditiis.
    </P>
    
</body>
</html>
